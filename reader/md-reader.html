<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f12;
    --surface:   #13161b;
    --border:    #1f2430;
    --border2:   #2a3040;
    --accent:    #4f8ef7;
    --accent2:   #7eb8f7;
    --text:      #c8d0dc;
    --text-dim:  #5a6478;
    --text-head: #e8edf5;
    --code-bg:   #0a0c0f;
    --tag:       #1a2035;
    --drop:      rgba(79,142,247,0.06);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── Layout ── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topbar-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .04em;
  }
  .topbar-logo span { color: var(--text-dim); }
  .topbar-sep { flex: 1; }
  .topbar-hint {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .drop-zone {
    margin: 14px;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--drop);
  }
  .drop-zone:hover, .drop-zone.over {
    border-color: var(--accent);
    background: rgba(79,142,247,0.10);
  }
  .drop-zone input { display: none; }
  .drop-icon { font-size: 20px; margin-bottom: 6px; }
  .drop-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.5;
  }
  .drop-label strong { color: var(--accent2); font-weight: 500; }

  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }
  .file-list::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background .15s;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    border: 1px solid transparent;
  }
  .file-item:hover { background: var(--tag); color: var(--text); }
  .file-item.active {
    background: var(--tag);
    border-color: var(--border2);
    color: var(--accent2);
  }
  .file-item .fi-icon { opacity: .5; font-size: 10px; }
  .file-item .fi-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-item .fi-del {
    opacity: 0;
    font-size: 14px;
    color: var(--text-dim);
    transition: opacity .15s;
    line-height: 1;
  }
  .file-item:hover .fi-del { opacity: 1; }
  .file-item .fi-del:hover { color: #e06c75; }

  .sidebar-empty {
    padding: 20px 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    line-height: 1.8;
  }

  /* ── Main ── */
  .main {
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* toolbar */
  .doc-toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 40px;
    background: rgba(13,15,18,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
  }
  .doc-filename { color: var(--accent2); font-weight: 500; }
  .doc-toolbar-sep { flex: 1; }
  .btn-copy {
    background: var(--tag);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent2); }

  /* welcome */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: .4;
  }
  .welcome-icon { font-size: 48px; }
  .welcome-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    line-height: 2;
  }

  /* ── Markdown content ── */
  .md-body {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  .md-body h1 {
    font-size: 1.9em;
    font-weight: 300;
    color: var(--text-head);
    border-bottom: 1px solid var(--border);
    padding-bottom: .5em;
    margin-bottom: 1em;
    letter-spacing: -.01em;
  }
  .md-body h2 {
    font-size: 1.25em;
    font-weight: 500;
    color: var(--text-head);
    margin: 2.2em 0 .7em;
    padding-bottom: .3em;
    border-bottom: 1px solid var(--border);
  }
  .md-body h3 {
    font-size: 1.05em;
    font-weight: 500;
    color: var(--accent2);
    margin: 1.8em 0 .5em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .md-body h4 {
    font-size: .95em;
    font-weight: 500;
    color: var(--text-dim);
    margin: 1.4em 0 .4em;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-family: 'IBM Plex Mono', monospace;
  }

  .md-body p { margin: .9em 0; }

  .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(79,142,247,.3); }
  .md-body a:hover { border-bottom-color: var(--accent); }

  .md-body strong { color: var(--text-head); font-weight: 500; }
  .md-body em { color: var(--accent2); font-style: italic; }

  .md-body ul, .md-body ol {
    margin: .8em 0 .8em 1.4em;
    padding: 0;
  }
  .md-body li { margin: .35em 0; }
  .md-body li > ul, .md-body li > ol { margin: .2em 0 .2em 1.2em; }

  .md-body blockquote {
    margin: 1.2em 0;
    padding: .8em 1.2em;
    border-left: 3px solid var(--accent);
    background: rgba(79,142,247,.05);
    border-radius: 0 4px 4px 0;
    color: var(--text-dim);
    font-style: italic;
  }

  .md-body code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .85em;
    background: var(--code-bg);
    color: var(--accent2);
    padding: .15em .4em;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .md-body pre {
    margin: 1.2em 0;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
    position: relative;
  }
  .md-body pre code {
    display: block;
    padding: 1.2em 1.4em;
    background: none;
    color: var(--text);
    border: none;
    font-size: .82em;
    line-height: 1.65;
  }

  .md-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.2em 0;
    font-size: .9em;
  }
  .md-body th {
    background: var(--tag);
    color: var(--text-head);
    font-weight: 500;
    padding: .6em 1em;
    text-align: left;
    border: 1px solid var(--border2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: .85em;
    letter-spacing: .03em;
  }
  .md-body td {
    padding: .55em 1em;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  .md-body tr:hover td { background: rgba(255,255,255,.02); }

  .md-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }

  /* tag badges in the text */
  .md-body p > code:only-child,
  .md-body li > code:only-child {
    background: var(--tag);
    color: var(--accent2);
  }
</style>
</head>
<body>

<div class="shell">

  <!-- topbar -->
  <header class="topbar">
    <div class="topbar-logo">md<span>//</span>reader</div>
    <div class="topbar-sep"></div>
    <div class="topbar-hint">drag .md files here or use the picker</div>
  </header>

  <!-- sidebar -->
  <aside class="sidebar">
    <label class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".md,.markdown" multiple>
      <div class="drop-icon">⌘</div>
      <div class="drop-label"><strong>open files</strong><br>or drag them here<br>.md / .markdown</div>
    </label>
    <div class="file-list" id="fileList">
      <div class="sidebar-empty" id="emptyMsg">no document open</div>
    </div>
  </aside>

  <!-- main -->
  <main class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">◈</div>
      <div class="welcome-text">open a markdown file<br>to start reading</div>
    </div>
  </main>

</div>

<script>
  const fileInput  = document.getElementById('fileInput');
  const dropZone   = document.getElementById('dropZone');
  const fileList   = document.getElementById('fileList');
  const emptyMsg   = document.getElementById('emptyMsg');
  const main       = document.getElementById('main');
  const welcome    = document.getElementById('welcome');

  const docs = [];   // { name, content }
  let   active = -1;

  // ── marked config ──
  marked.setOptions({ breaks: true, gfm: true });

  // ── file input ──
  fileInput.addEventListener('change', e => loadFiles(e.target.files));

  // ── drag & drop ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    loadFiles(e.dataTransfer.files);
  });

  // anche su tutto il body
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    loadFiles(e.dataTransfer.files);
  });

  function loadFiles(files) {
    [...files].forEach(file => {
      if (!file.name.match(/\.(md|markdown)$/i)) return;
      const reader = new FileReader();
      reader.onload = ev => {
        // evita duplicati
        const idx = docs.findIndex(d => d.name === file.name);
        if (idx >= 0) { docs[idx].content = ev.target.result; if (active === idx) render(idx); }
        else { docs.push({ name: file.name, content: ev.target.result }); }
        rebuildList();
        if (active < 0) openDoc(docs.length - 1);
      };
      reader.readAsText(file);
    });
  }

  function rebuildList() {
    fileList.innerHTML = '';
    if (docs.length === 0) { fileList.appendChild(emptyMsg); return; }
    docs.forEach((doc, i) => {
      const el = document.createElement('div');
      el.className = 'file-item' + (i === active ? ' active' : '');
      el.innerHTML = `<span class="fi-icon">◈</span>
                      <span class="fi-name">${doc.name}</span>
                      <span class="fi-del" data-idx="${i}" title="rimuovi">✕</span>`;
      el.addEventListener('click', ev => {
        if (ev.target.classList.contains('fi-del')) { removeDoc(+ev.target.dataset.idx); return; }
        openDoc(i);
      });
      fileList.appendChild(el);
    });
  }

  function openDoc(i) {
    active = i;
    rebuildList();
    render(i);
  }

  function removeDoc(i) {
    docs.splice(i, 1);
    if (active >= docs.length) active = docs.length - 1;
    if (docs.length === 0) { active = -1; showWelcome(); }
    else render(active);
    rebuildList();
  }

  function showWelcome() {
    main.innerHTML = '';
    main.appendChild(welcome);
  }

  function render(i) {
    const doc = docs[i];
    const html = marked.parse(doc.content);

    main.innerHTML = `
      <div class="doc-toolbar">
        <span class="doc-filename">${doc.name}</span>
        <span class="doc-toolbar-sep"></span>
        <button class="btn-copy" id="btnCopy">copy text</button>
      </div>
      <div class="md-body">${html}</div>
    `;

    document.getElementById('btnCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(doc.content).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = 'copied ✓';
        setTimeout(() => btn.textContent = 'copy text', 1800);
      });
    });

    main.scrollTo(0, 0);
  }
</script>
</body>
</html>
